<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f4f4f5;
      min-height: 100vh;
    }

    /* ── Tabs ── */
    .tab-bar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      padding: 0 2rem;
    }
    .tab-btn {
      padding: 1rem 1.5rem;
      font-size: .9rem;
      font-weight: 500;
      color: #6b7280;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      cursor: pointer;
      transition: color .2s, border-color .2s;
      font-family: 'DM Sans', sans-serif;
    }
    .tab-btn:hover { color: #111; }
    .tab-btn.active { color: #6366f1; border-bottom-color: #6366f1; font-weight: 600; }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 53px); }

    /* ── Upload card ── */
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .card h1 { font-size: 1.3rem; font-weight: 600; color: #111; margin-bottom: .4rem; }
    .card p  { font-size: .85rem; color: #888; margin-bottom: 2rem; }

    .drop-zone {
      border: 2px dashed #d1d5db;
      border-radius: 12px;
      padding: 2.5rem 1rem;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, background .2s;
      margin-bottom: 1.25rem;
    }
    .drop-zone:hover, .drop-zone.over { border-color: #6366f1; background: #f5f3ff; }
    .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { font-size: 2.25rem; display: block; margin-bottom: .75rem; }
    .drop-text { font-size: .9rem; color: #374151; font-weight: 500; }
    .drop-sub  { font-size: .75rem; color: #9ca3af; margin-top: .3rem; }

    .selected-file { font-size: .82rem; color: #6366f1; font-weight: 500; margin-bottom: 1.25rem; min-height: 1.2rem; word-break: break-all; }

    .upload-btn {
      width: 100%; padding: .85rem;
      background: #6366f1; color: #fff;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: background .2s, transform .1s;
    }
    .upload-btn:hover:not(:disabled) { background: #4f46e5; transform: translateY(-1px); }
    .upload-btn:disabled { background: #c7d2fe; cursor: not-allowed; }

    /* ── Dashboard placeholder ── */
    .dashboard-placeholder {
      text-align: center;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .coming-badge {
      background: #ede9fe; color: #6d28d9;
      font-size: .72rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      padding: .3rem .85rem; border-radius: 999px;
    }
    .dashboard-placeholder h2 { font-size: 1.6rem; color: #111; font-weight: 600; }
    .dashboard-placeholder p  { font-size: .9rem; color: #6b7280; max-width: 360px; line-height: 1.6; }

    /* ── Popup ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); backdrop-filter: blur(3px); align-items: center; justify-content: center; z-index: 100; }
    .overlay.show { display: flex; }
    .popup { background: #fff; border-radius: 16px; padding: 2rem 2rem 1.5rem; width: 90%; max-width: 340px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.15); animation: popIn .2s ease; }
    @keyframes popIn { from { transform: scale(.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .popup-icon  { font-size: 2.75rem; display: block; margin-bottom: .75rem; }
    .popup-title { font-size: 1.1rem; font-weight: 600; margin-bottom: .4rem; }
    .popup-msg   { font-size: .83rem; color: #6b7280; margin-bottom: 1.5rem; line-height: 1.5; }
    .popup-btn   { padding: .65rem 2rem; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 600; cursor: pointer; }
    .popup-btn.ok  { background: #6366f1; color: #fff; }
    .popup-btn.err { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>

<!-- Tabs -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('upload', this)">Invoice File Upload</button>
  <button class="tab-btn" onclick="switchTab('dashboard', this)">Invoice Processing Dashboard</button>
</div>

<!-- Upload Page -->
<div class="page active" id="page-upload">
  <div class="card">
    <h1>Upload Invoice</h1>
    <p>Accepted formats: JPG, PNG, PDF</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.pdf" />
      <span class="drop-icon">🧾</span>
      <div class="drop-text">Drag & drop or click to browse</div>
      <div class="drop-sub">JPG · PNG · PDF</div>
    </div>

    <div class="selected-file" id="selectedFile"></div>

    <button class="upload-btn" id="uploadBtn" onclick="startUpload()" disabled>Upload</button>
  </div>
</div>

<!-- Dashboard Page -->
<div class="page" id="page-dashboard">
  <div class="dashboard-placeholder">
    <span class="coming-badge">Coming Soon</span>
    <h2>Invoice Processing Dashboard</h2>
    <p>This dashboard is under development. Check back soon for invoice analytics, processing status, and more.</p>
  </div>
</div>

<!-- Popup -->
<div class="overlay" id="overlay">
  <div class="popup">
    <span class="popup-icon" id="popIcon"></span>
    <div class="popup-title" id="popTitle"></div>
    <div class="popup-msg"   id="popMsg"></div>
    <button class="popup-btn" id="popBtn" onclick="closePopup()"></button>
  </div>
</div>

<script>
  const ALLOWED = ['image/jpeg', 'image/png', 'application/pdf'];
  let chosenFile = null;

  function switchTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');

  if (name === "dashboard") {
    loadInvoices();
  }
}

  const dropZone     = document.getElementById('dropZone');
  const fileInput    = document.getElementById('fileInput');
  const selectedFile = document.getElementById('selectedFile');
  const uploadBtn    = document.getElementById('uploadBtn');

  fileInput.addEventListener('change', () => pick(fileInput.files[0]));
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); pick(e.dataTransfer.files[0]); });

  function pick(file) {
    if (!file) return;
    if (!ALLOWED.includes(file.type)) {
      showPopup('error', 'Invalid File Type', 'Only JPG, PNG, and PDF files are allowed.');
      return;
    }
    chosenFile = file;
    selectedFile.textContent = file.name + ' (' + formatBytes(file.size) + ')';
    uploadBtn.disabled = false;
  }

async function startUpload() {
  if (!chosenFile) return;

  uploadBtn.disabled = true;
  uploadBtn.textContent = 'Uploading…';

  const fd = new FormData();
  fd.append('file', chosenFile);

  // 👇 CHANGE THIS LINE
  fd.append('folder', 'raw');

  fd.append('make_public', false);

  try {
    const res = await fetch('/upload', {
      method: 'POST',
      body: fd
    });

    const data = await res.json();

    if (res.ok && data.success) {
      showPopup(
        'success',
        'Upload Successful!',
        `"${data.file_name}" uploaded to S3`
      );
      reset();
    } else {
      showPopup(
        'error',
        'Upload Failed',
        data.detail || 'Something went wrong.'
      );
    }
  } catch (err) {
    showPopup(
      'error',
      'Network Error',
      'Cannot reach server.'
    );
  }

  uploadBtn.textContent = 'Upload';
  uploadBtn.disabled = !chosenFile;
}

  function reset() {
    chosenFile = null;
    fileInput.value = '';
    selectedFile.textContent = '';
    uploadBtn.disabled = true;
  }

  function showPopup(type, title, msg) {
    document.getElementById('popIcon').textContent  = type === 'success' ? '✅' : '❌';
    document.getElementById('popTitle').textContent = title;
    document.getElementById('popMsg').textContent   = msg;
    const btn = document.getElementById('popBtn');
    btn.textContent = type === 'success' ? 'Done' : 'Try Again';
    btn.className   = 'popup-btn ' + (type === 'success' ? 'ok' : 'err');
    document.getElementById('overlay').classList.add('show');
  }

  function closePopup() {
    document.getElementById('overlay').classList.remove('show');
  }

  function formatBytes(b) {
    if (b < 1024)    return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }


  async function loadInvoices() {
  const container = document.getElementById("tableContainer");
  container.innerHTML = "Loading...";

  try {
    const res = await fetch("/invoices");
    const data = await res.json();

    if (!data.success) {
      container.innerHTML = "Failed to load invoices";
      return;
    }

    const rows = data.data;

    if (rows.length === 0) {
      container.innerHTML = "<p>No invoices found</p>";
      return;
    }

    const columns = Object.keys(rows[0]);

    let html = `
      <table style="
        width:100%;
        border-collapse:collapse;
        background:white;
        border-radius:10px;
        overflow:hidden;
      ">
        <thead>
          <tr>
    `;

    for (const col of columns) {
      html += `<th style="text-align:left;padding:10px;border-bottom:1px solid #eee;">${col}</th>`;
    }

    html += `
          </tr>
        </thead>
        <tbody>
    `;

    for (const row of rows) {
      html += "<tr>";
      for (const col of columns) {
        html += `<td style="padding:10px;border-bottom:1px solid #f0f0f0;">
          ${row[col] ?? ""}
        </td>`;
      }
      html += "</tr>";
    }

    html += `
        </tbody>
      </table>
    `;

    container.innerHTML = html;

  } catch (err) {
    container.innerHTML = "Error loading invoices";
  }
}
</script>
</body>
</html>
