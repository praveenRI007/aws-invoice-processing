version: 1.0
runtime: python3

build:
  commands:
    build:
      - pip install -r aws-invoice-processing/requirements.txt

run:
  runtime-version: 3.11.0
  command: streamlit run aws-invoice-processing/app.py --server.port 8080 --server.address 0.0.0.0
  network:
    port: 8080

  env:
    - name: S3_BUCKET
      value: "invoice-processing-2025"
    - name: DYNAMODB_TABLE
      value: "invoices"
    - name: AWS_REGION
      value: "us-east-1"
