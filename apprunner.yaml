version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip install -r streamlit_app/requirements.txt

run:
  runtime-version: 3.11.0
  command: streamlit run streamlit_app/app.py --server.port 8080 --server.address 0.0.0.0 --server.headless true
  network:
    port: 8080
    env: APP_PORT

  env:
    - name: S3_BUCKET
      value: "invoice-uploads"
    - name: DYNAMODB_TABLE
      value: "invoices"
    - name: AWS_REGION
      value: "us-east-1"
